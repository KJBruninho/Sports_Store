<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>SportZone - Loja de Artigos Desportivos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 1rem 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: bold;
        }

        nav {
            background: #34495e;
            padding: 1rem 0;
        }

        .nav-content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 30px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        nav a:hover {
            background-color: #3498db;
            transform: translateY(-1px);
        }

        .cart-info {
            background: #e74c3c;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        /* Main Content */
        main {
            padding: 2rem 0;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: #2c3e50;
        }

        /* Products Section */
        .products-section {
            background: white;
            border-radius: 10px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .no-products {
            text-align: center;
            padding: 3rem;
            color: #666;
            font-size: 1.2rem;
        }

        .no-products::before {
            content: "📦";
            font-size: 4rem;
            display: block;
            margin-bottom: 1rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border-color: #3498db;
        }

        .product-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .product-name a {
            color: #2c3e50;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .product-name a:hover {
            color: #3498db;
        }

        .product-description {
            color: #666;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .product-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #e74c3c;
        }

        .product-stock {
            color: #27ae60;
            font-weight: 500;
        }

        .add-to-cart {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
            width: 100%;
            text-align: center;
            transition: all 0.3s ease;
        }

        .add-to-cart:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(52, 152, 219, 0.3);
        }

        /* Footer */
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 2rem 0;
            margin-top: 2rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            .nav-content {
                flex-direction: column;
                gap: 15px;
            }

            .product-grid {
                grid-template-columns: 1fr;
            }

            .section-title {
                font-size: 2rem;
            }

            .product-details {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }

        /* Cart Animation */
        .cart-info {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>🏃‍♂️ SportZone</h1>
                </div>
            </div>
        </div>
    </header>

    <nav>
        <div class="container">
            <div class="nav-content">
                <a th:href="@{/}">Home</a>
                <a th:href="@{/signup}">Registar</a>
                <a th:href="@{/login}">Entrar</a>
                <a th:href="@{/home}">Catálogo</a>
                <a th:href="@{/carrinho}" title="Ver Carrinho" class="cart-info">
                    🛒 Carrinho (<span th:text="${carrinho != null ? carrinho.getItens().size() : 0}">0</span> itens) |
                    Total: <span th:text="${carrinho != null ? carrinho.getTotal() : 0}">0</span> €
                </a>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            <section class="products-section">
                <h2 class="section-title">Catálogo de Produtos</h2>

                <div th:if="${produtos == null || produtos.isEmpty()}" class="no-products">
                    <p>Nenhum produto disponível.</p>
                </div>

                <div class="product-grid" th:unless="${produtos == null || produtos.isEmpty()}">
                    <div th:each="produto : ${produtos}" class="product-card">
                        <h3 class="product-name">
                            <a th:href="@{/produto/{id}(id=${produto.idProduto})}" th:text="${produto.nome}">Nome Produto</a>
                        </h3>
                        <p class="product-description" th:text="${produto.descricao}">Descrição aqui</p>
                        <div class="product-details">
                            <span class="product-price">
                                <span th:text="${produto.preco}">0.00</span> €
                            </span>
                            <span class="product-stock">
                                Stock: <span th:text="${produto.stock}">0</span>
                            </span>
                        </div>
                        <a th:href="@{/carrinho/adicionar/{id}(id=${produto.idProduto})}" class="add-to-cart">
                            🛒 Adicionar ao carrinho
                        </a>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2025 SportZone - Loja de Artigos Desportivos</p>
        </div>
    </footer>
</body>
</html>
