<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Carrinho de Compras - SportZone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 1rem 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: bold;
        }

        nav {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 15px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        nav a:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* Main Content */
        main {
            padding: 2rem 0;
            min-height: calc(100vh - 200px);
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: #2c3e50;
        }

        /* Cart Items */
        .cart-section {
            background: white;
            border-radius: 10px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .empty-cart {
            text-align: center;
            padding: 3rem;
            color: #666;
            font-size: 1.2rem;
        }

        .empty-cart::before {
            content: "🛒";
            font-size: 4rem;
            display: block;
            margin-bottom: 1rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 1rem;
            background: #fafafa;
            transition: transform 0.3s ease;
        }

        .cart-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .item-details {
            display: flex;
            gap: 20px;
            color: #666;
        }

        .item-price {
            font-size: 1.1rem;
            font-weight: bold;
            color: #e74c3c;
        }

        .item-stock {
            color: #27ae60;
        }

        .remove-btn {
            background: #e74c3c;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background-color 0.3s ease;
        }

        .remove-btn:hover {
            background: #c0392b;
            transform: translateY(-1px);
        }

        /* Total Section */
        .total-section {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 2rem;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 2rem;
        }

        .total-amount {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .checkout-btn {
            background: #e74c3c;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .checkout-btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.3);
        }

        /* Footer */
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 2rem 0;
            margin-top: auto;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            nav {
                flex-wrap: wrap;
                justify-content: center;
            }

            .cart-item {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .item-details {
                justify-content: center;
                flex-wrap: wrap;
            }

            .section-title {
                font-size: 2rem;
            }

            .total-amount {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>🛒 SportZone - Carrinho</h1>
                </div>
                <nav>
                    <a th:href="@{/home}">Home</a>
                    <a th:href="@{/carrinho/limpar}">Limpar Carrinho</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <section class="cart-section">
                <h2 class="section-title">Itens no Carrinho</h2>

                <div th:if="${itens.isEmpty()}" class="empty-cart">
                    <p>O carrinho está vazio.</p>
                    <a th:href="@{/home}" class="checkout-btn" style="margin-top: 1rem;">Continuar Comprando</a>
                </div>

                <div th:each="produto : ${itens}" class="cart-item">
                    <div class="item-info">
                        <div class="item-name" th:text="${produto.nome}">Nome do Produto</div>
                        <div class="item-details">
                            <span class="item-price" th:text="${produto.preco} + ' €'">Preço</span>
                            <span class="item-stock" th:text="${produto.stock} + ' unidades'">Estoque</span>
                        </div>
                    </div>
                    <a th:href="@{/carrinho/remover/{id}(id=${produto.idProduto})}" class="remove-btn">Remover</a>
                </div>
            </section>

            <section th:unless="${itens.isEmpty()}" class="total-section">
                <h3>Total do Carrinho</h3>
                <div class="total-amount" th:text="${total} + ' €'">0.00 €</div>
                <button class="checkout-btn">Finalizar Compra</button>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2025 SportZone - Loja de Artigos Desportivos</p>
        </div>
    </footer>
</body>
</html>
